<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>A2A2H</title>
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="icon" href="/static/icon-192.png" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
</head>
<body>
  <header class="topbar">
    <h1>A2A2H</h1>
    <div class="status" id="status">connecting…</div>
    <details class="settings">
      <summary aria-label="Settings and features">⋯</summary>
      <div class="settings-panel">
        <label class="settings-row" title="Show agent coordination traffic inline with chat"><input type="checkbox" id="toggle-a2a" /> Show agent coordination</label>
        <a class="settings-row" id="chat-history" href="/chat-log/" target="_blank" rel="noopener">Chat history</a>
        <button class="settings-row" id="enable-push" title="Subscribe this device and send a live self-test push notification">Test push</button>
        <button class="settings-row" id="voice-toggle" aria-pressed="false" title="Speak new A2A2H replies aloud">Voice off</button>
        <button class="settings-row" id="refresh-app" title="Refresh the installed PWA shell">Update app</button>
        <span class="settings-row settings-status" id="push-status"></span>
        <span class="settings-row settings-status" id="voice-status"></span>
        <button class="settings-row settings-secondary" id="report-push-status" hidden>Report push status</button>
        <button class="settings-row settings-secondary" id="report-voice-status" hidden>Report voice status</button>
        <span class="settings-row settings-help" id="push-help" hidden></span>
        <span class="settings-row settings-help" id="voice-help" hidden></span>
      </div>
    </details>
  </header>
  <main id="messages" aria-live="polite"></main>
  <form id="composer" autocomplete="off">
    <button type="button" id="voice-input" title="Dictate a message">🎙</button>
    <input id="input" name="text" placeholder="Talk to A2A2H. Use @Hermes to address Hermes directly." autofocus />
    <button type="submit">Send</button>
  </form>
  <script src="/static/app.js" defer></script>
</body>
</html>
